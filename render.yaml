# Auto-deploy verification: this comment exists only to force a no-op
# commit that proves the GitHub -> Render webhook is firing on git push.
# If you see deploys appearing with trigger=git after this commit, the
# autoDeploy chain is wired up correctly end-to-end.
services:
  - type: web
    name: venezuela-investment-journal
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: NEWSLETTER_PROVIDER
        value: buttondown
      - key: NEWSLETTER_FROM_EMAIL
        value: briefing@venezuelanbusiness.net
      - key: NEWSLETTER_API_KEY
        sync: false
      - key: GOOGLE_INDEXING_SA_JSON
        sync: false
      - key: BLUESKY_HANDLE
        sync: false
      - key: BLUESKY_APP_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health

  - type: cron
    name: vij-daily-pipeline
    runtime: python
    # Render schedules cron in UTC. We want 10:00 and 17:00 in Medellín
    # (America/Bogota, UTC-5), which is 15:00 and 22:00 UTC.
    schedule: "0 15,22 * * *"
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python run_daily.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: NEWSLETTER_PROVIDER
        value: buttondown
      - key: NEWSLETTER_FROM_EMAIL
        value: briefing@venezuelanbusiness.net
      - key: NEWSLETTER_API_KEY
        sync: false
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: GOOGLE_INDEXING_SA_JSON
        sync: false
      - key: BLUESKY_HANDLE
        sync: false
      - key: BLUESKY_APP_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO
