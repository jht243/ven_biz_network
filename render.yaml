services:
  - type: web
    name: venezuela-investment-journal
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: NEWSLETTER_PROVIDER
        value: buttondown
      - key: NEWSLETTER_FROM_EMAIL
        value: briefing@venezuelanbusiness.net
      - key: NEWSLETTER_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health

  - type: cron
    name: vij-daily-pipeline
    runtime: python
    schedule: "0 10,17 * * *"
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python run_daily.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: NEWSLETTER_PROVIDER
        value: buttondown
      - key: NEWSLETTER_FROM_EMAIL
        value: briefing@venezuelanbusiness.net
      - key: NEWSLETTER_API_KEY
        sync: false
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
